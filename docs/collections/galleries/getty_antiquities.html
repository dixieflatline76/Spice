<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏛️ Antiquities &amp; Artifacts - Spice Gallery</title>
    <style>
        body {
            background-color: #4a3b2c;
            margin: 0;
            padding: 60px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
        }

        h1 {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 60px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 60px;
            max-width: 1400px;
            width: 100%;
            align-items: center;
        }

        .frame {
            background: linear-gradient(135deg, #4a2f1d, #2d1c11);
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
            position: relative;
        }

        .frame:hover {
            transform: scale(1.02) translateY(-5px);
        }

        .matboard {
            background-color: #fdfdfa;
            padding: 35px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .artwork {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3), 0 2px 5px rgba(0,0,0,0.2);
            background: linear-gradient(45deg, #8b7355, #cdb49a);
        }

         
        .frame:nth-child(even) {
            transform: translateY(40px);
        }
        .frame:nth-child(even):hover {
            transform: scale(1.02) translateY(35px);
        }
    </style>
</head>
<body>
    <h1>🏛️ Antiquities &amp; Artifacts</h1>
    <div class="gallery-container">
        
        <div class="frame">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 3/4; background: url('https://media.getty.edu/iiif/image/3edc339a-7e2f-4fc5-8243-ce5b97929ad6/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>
        
        
        <div class="frame">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 1/1; background: url('https://media.getty.edu/iiif/image/46f2827e-36f3-496c-9e38-871ba80ed7fa/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>

        
        <div class="frame" style="transform: scale(1.1); z-index: 10;">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 4/3; background: url('https://media.getty.edu/iiif/image/c5b27f96-3819-45dd-8074-08eb0291c0dd/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>

        
        <div class="frame">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 3/4; background: url('https://media.getty.edu/iiif/image/1453e737-ffc1-476d-8c19-9f4a21fff228/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>

        
        <div class="frame">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 4/5; background: url('https://media.getty.edu/iiif/image/47a40502-016b-4fef-8a28-fcea3441cf2e/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>
    </div>
</body>
</html>
