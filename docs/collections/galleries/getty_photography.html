<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📷 Vintage Photography - Spice Gallery</title>
    <style>
        body {
            background-color: #4a3b2c;
            margin: 0;
            padding: 60px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
        }

        h1 {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 60px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 60px;
            max-width: 1400px;
            width: 100%;
            align-items: center;
        }

        .frame {
            background: linear-gradient(135deg, #4a2f1d, #2d1c11);
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
            position: relative;
        }

        .frame:hover {
            transform: scale(1.02) translateY(-5px);
        }

        .matboard {
            background-color: #fdfdfa;
            padding: 35px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .artwork {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3), 0 2px 5px rgba(0,0,0,0.2);
            background: linear-gradient(45deg, #8b7355, #cdb49a);
        }

         
        .frame:nth-child(even) {
            transform: translateY(40px);
        }
        .frame:nth-child(even):hover {
            transform: scale(1.02) translateY(35px);
        }
    </style>
</head>
<body>
    <h1>📷 Vintage Photography</h1>
    <div class="gallery-container">
        
        <div class="frame">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 3/4; background: url('https://media.getty.edu/iiif/image/43857a68-0a67-466d-82e7-6cec466aabb1/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>
        
        
        <div class="frame">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 1/1; background: url('https://media.getty.edu/iiif/image/97b70834-5e19-4637-b596-4a80346bdc61/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>

        
        <div class="frame" style="transform: scale(1.1); z-index: 10;">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 4/3; background: url('https://media.getty.edu/iiif/image/0cb28cda-cea9-47fa-819a-65ccc0af3ebe/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>

        
        <div class="frame">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 3/4; background: url('https://media.getty.edu/iiif/image/5212c5ab-ceda-457e-a1de-c33b8ae89d72/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>

        
        <div class="frame">
            <div class="matboard">
                <div class="artwork" style="aspect-ratio: 4/5; background: url('https://media.getty.edu/iiif/image/9d0925ce-2db0-43ad-ab87-94dbb390dec7/full/max/0/default.jpg') center/cover;"></div>
            </div>
        </div>
    </div>
</body>
</html>
