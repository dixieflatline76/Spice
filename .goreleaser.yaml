# .goreleaser.yaml
# Finalized Orchestrator for Spice: High-transparency release automation.

version: 2

project_name: spice

# We use the 'skip: true' build strategy to orchestrate pre-signed artifacts
# produced by our existing pipeline (Azure Code Signing & macOS Notarization).
builds:
  - id: win-raw-exe
    binary: Spice-{{ .Version }}-windows-amd64
    goos: [windows]
    goarch: [amd64]
    skip: true
  - id: win-setup-exe
    binary: Spice-Setup-{{ .Version }}-windows-amd64
    goos: [windows]
    goarch: [amd64]
    skip: true
  - id: mac-dmg
    # Note: .dmg extension is included here as the 'binary' name for the archive
    binary: Spice-{{ .Version }}-macos-arm64.dmg
    goos: [darwin]
    goarch: [arm64]
    skip: true

# Archives are set to 'format: binary' to ensure solo file distribution,
# picking up the already-renamed files from the CI staging area.
archives:
  - id: win-raw-exe
    ids: [win-raw-exe]
    formats: [binary]
    name_template: "Spice-{{ .Version }}-windows-amd64"
  - id: win-setup-exe
    ids: [win-setup-exe]
    formats: [binary]
    name_template: "Spice-Setup-{{ .Version }}-windows-amd64"
  - id: mac-dmg
    ids: [mac-dmg]
    formats: [binary]
    name_template: "Spice-{{ .Version }}-macos-arm64"

# Include browser extensions in the release and checksums.
# .msix and .pkg are EXPLICITLY excluded to keep them for Store distribution only.
release:
  github:
    owner: dixieflatline76
    name: Spice
  extra_files:
    - glob: ./dist/Spice-Extension-*.zip

# Automated Homebrew Cask generation
homebrew_casks:
  - name: spice
    ids: [mac-dmg] # Force it to recognize our binary ID
    url_template: "https://github.com/dixieflatline76/Spice/releases/download/{{ .Tag }}/Spice-{{ .Version }}-macos-arm64.dmg"
    repository:
      owner: dixieflatline76
      name: homebrew-spice
    homepage: "https://spicebox.dev"
    description: "Highly-concurrent, plugin-driven desktop environment engine"
    custom_block: |
      app "Spice.app"
      app "Spice Wallpaper Manager Extension.app"
    binaries: []
    zap:
      trash:
        - "~/Library/Application Support/Spice"
        - "~/Library/Preferences/com.dixieflatline76.spice.plist"
        - "~/Library/Saved Application State/com.dixieflatline76.spice.savedState"

# Automated Winget manifest generation
winget:
  - package_identifier: DixieFlatline76.Spice
    # V2 requires you to explicitly declare your fork repository here:
    repository:
      owner: dixieflatline76
      name: winget-pkgs
    package_name: Spice
    publisher: Karl Kwong
    publisher_url: "https://spicebox.dev"
    license: PolyForm Noncommercial 1.0.0
    short_description: "A highly-concurrent, plugin-driven desktop environment engine."
    tags:
      - wallpaper
      - desktop
      - customization
      - go
      - engine

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "merge"
