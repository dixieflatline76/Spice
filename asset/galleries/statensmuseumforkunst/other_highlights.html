    <style>
        body {
            background-color: #4a3b2c;

            flex-direction: column;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        h1 {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 60px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 10;
        }

        .gallery-wall {
            position: relative;
            width: 100%;
            max-width: 1100px;
             
            aspect-ratio: 1.4399967733977395;
        }

        .artwork-container {
            position: absolute;
            transition: transform 0.3s ease;
        }

        .artwork-container:hover {
            transform: scale(1.03) translateY(-5px);
            z-index: 100;
        }

        .artwork {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .paper-label {
            position: absolute;
            background-color: #fdfbf7;
            border: 1px solid #dcd3c6;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            color: #2c2c2c;
            padding: 10px 15px;

            font-size: 13px;
            width: max-content;
            max-width: 200px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .paper-label .title { font-weight: bold; font-style: italic; }
        .paper-label .artist { font-weight: normal; }
        .paper-label .year { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; color: #555; }

        .gallery-footer {
            width: 100%;
            max-width: 1100px;
            margin-top: 80px;
            margin-bottom: 20px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .gallery-footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .gallery-footer a:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .brand-link {
            font-weight: 600;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7) !important;
        }

        .footer-links {
            display: flex;
            gap: 15px;
            font-size: 13px;
        }

        const originalTitle = "Other Highlights";

        document.addEventListener('DOMContentLoaded', () => {
            
            let lang = window.spiceAppLocale;
            if (!lang) {
                lang = navigator.language.split('-')[0];
            }
            
            if (lang && translations[lang]) {
                const trans = translations[lang];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (trans[key]) el.textContent = trans[key];
                });
                
                
                const tTitle = trans[originalTitle] || originalTitle;
                const tSpice = trans["Spice Gallery"] || "Spice Gallery";
                document.title = tTitle + " - " + tSpice;
            }

            
            const containers = document.querySelectorAll('.artwork-container');
            let hoverTimer;

            containers.forEach(container => {
                const label = container.querySelector('.paper-label');
                if (!label) return;

                container.addEventListener('mouseenter', (e) => {
                    hoverTimer = setTimeout(() => {
                        label.style.opacity = '1';
                    }, 1000);
                });
                
                container.addEventListener('mousemove', (e) => {
                    const rect = container.getBoundingClientRect();
                    const x = e.clientX - rect.left + 15;
                    const y = e.clientY - rect.top;
                    label.style.left = x + 'px';
                    label.style.top = y + 'px';
                });

                container.addEventListener('mouseleave', () => {
                    clearTimeout(hoverTimer);
                    label.style.opacity = '0';
                });
            });
        });
    </script>
